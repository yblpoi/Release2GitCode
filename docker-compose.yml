services:
  release2gitcode:
    build:
      context: .
      dockerfile: Dockerfile
    image: release2gitcode:latest
    container_name: ${CONTAINER_NAME:-release2gitcode}
    restart: unless-stopped
    ports:
      - "${PUBLISHED_PORT:-8000}:${PORT:-8000}"
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      REQUIRE_HTTPS: ${REQUIRE_HTTPS:-false}
      API_KEY: ${API_KEY:-}
      API_KEY_HASH: ${API_KEY_HASH:-}
      GITHUB_API_BASE: ${GITHUB_API_BASE:-https://api.github.com}
      GITHUB_DOWNLOAD_USER_AGENT: ${GITHUB_DOWNLOAD_USER_AGENT:-Release2GitCode/3.0 (github-release-sync)}
      GITCODE_API_BASE: ${GITCODE_API_BASE:-https://api.gitcode.com/api/v5}
      CHUNK_SIZE: ${CHUNK_SIZE:-1048576}
      UPLOAD_ATTEMPTS: ${UPLOAD_ATTEMPTS:-5}
      GITHUB_MAX_RETRIES: ${GITHUB_MAX_RETRIES:-5}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-30.0}
      HTTP_MAX_CONNECTIONS: ${HTTP_MAX_CONNECTIONS:-20}
      HTTP_MAX_KEEPALIVE_CONNECTIONS: ${HTTP_MAX_KEEPALIVE_CONNECTIONS:-20}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-1.0}
      GITHUB_BACKOFF_BASE_SECONDS: ${GITHUB_BACKOFF_BASE_SECONDS:-1.0}
      GITHUB_BACKOFF_MAX_SECONDS: ${GITHUB_BACKOFF_MAX_SECONDS:-60.0}
      SYNC_CONCURRENCY: ${SYNC_CONCURRENCY:-3}
      SYNC_MAX_ACTIVE_TASKS: ${SYNC_MAX_ACTIVE_TASKS:-2}
      ADAPTIVE_SYNC_ENABLED: ${ADAPTIVE_SYNC_ENABLED:-true}
      ADAPTIVE_SYNC_MAX_CONCURRENCY: ${ADAPTIVE_SYNC_MAX_CONCURRENCY:-3}
      ADAPTIVE_SYNC_WINDOW_SIZE: ${ADAPTIVE_SYNC_WINDOW_SIZE:-10}
      ADAPTIVE_SYNC_HIGH_RATIO: ${ADAPTIVE_SYNC_HIGH_RATIO:-0.2}
      ADAPTIVE_SYNC_MEDIUM_RATIO: ${ADAPTIVE_SYNC_MEDIUM_RATIO:-0.1}
      SERVER_LOG_LEVEL: ${SERVER_LOG_LEVEL:-debug}
      SERVER_ACCESS_LOG: ${SERVER_ACCESS_LOG:-true}
    volumes:
      - ${DATA_DIR:-./data}:/data
